<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Niche Job Alerts</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="wrap">
    <h1>Niche Job Alerts</h1>
    <div class="search">
      <input id="q" placeholder="Search title, company, or tags..." />
      <input id="location" placeholder="Location (e.g. remote, NYC)" />
      <button id="search">Search</button>
      <button id="reset">Reset</button>
    </div>
    <div id="results">Loading jobs…</div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
